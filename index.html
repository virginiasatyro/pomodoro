<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f3ec" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="app.js" defer></script>
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="timer-panel" aria-label="Pomodoro Timer">
        <p class="session-label">Foco</p>
        <h1 id="app-title">Pomodoro Timer</h1>
        <output class="timer-display" id="timer-display" aria-live="polite">
          25:00
        </output>
      </section>
    </main>
  </body>
</html>
