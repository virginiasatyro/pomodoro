<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f7fb" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/app.js" defer></script>
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="timer-panel" aria-label="Pomodoro Timer">
        <p class="session-label">Foco</p>
        <h1 id="app-title">Pomodoro Timer</h1>

        <div class="modes" aria-label="Timer modes">
          <button
            class="mode-button active"
            id="pomodoro-mode"
            type="button"
            data-mode="pomodoro">
            Pomodoro
          </button>
          <button
            class="mode-button"
            id="short-break-mode"
            type="button"
            data-mode="shortBreak">
            Short Break
          </button>
          <button
            class="mode-button"
            id="long-break-mode"
            type="button"
            data-mode="longBreak">
            Long Break
          </button>
        </div>

        <output class="timer-display" id="timer-display" aria-live="polite">
          25:00
        </output>

        <div class="progress" aria-hidden="true">
          <span class="progress-bar" id="progress-bar"></span>
        </div>

        <p class="status" id="timer-status">Ready to focus</p>

        <div class="controls" aria-label="Timer controls">
          <button class="button button-primary" id="start-button" type="button">
            Start
          </button>
          <button class="button" id="pause-button" type="button" disabled>
            Pause
          </button>
          <button class="button" id="reset-button" type="button">
            Reset
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
